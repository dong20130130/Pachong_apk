name: Build Android APK

# 触发：手动触发，或推送到 main/master 时自动构建
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    # ubuntu-22.04 用较旧 autotools(libtool 2.4.6)，可正常构建 p4a 的 libffi 配方；
    # ubuntu-24.04 的 libtool 2.4.7 会让 libffi 的 configure.ac 报 LT_SYS_SYMBOL_USCORE 未定义而失败。
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool pkg-config ccache \
            build-essential libssl-dev libffi-dev zlib1g-dev \
            libsqlite3-dev libbz2-dev libreadline-dev liblzma-dev libjpeg-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          # 锁定经过验证的稳定组合，避免最新版漂移导致 p4a 编译失败
          # 注意：buildozer 无 1.5.2 版本，PyPI 现有 ...1.5.0, 1.6.0；这里用 1.5.0
          pip install "buildozer==1.5.0" "Cython==0.29.36"

      - name: Use JDK 17 for Gradle (AGP requires Java 17)
        run: |
          # buildozer 1.5.0 生成的 Gradle 8.14 + Android Gradle Plugin 需要 Java 17，
          # 而 runner 默认 JAVA_HOME 指向 JDK 11，会导致 gradlew 立即失败：
          #   "Android Gradle plugin requires Java 17 to run. You are currently using Java 11."
          # openjdk-17-jdk 已在“Install system dependencies”里用 apt 安装，这里把 JAVA_HOME 指向它。
          J17=$(ls -d /usr/lib/jvm/java-17-openjdk-amd64 2>/dev/null || ls -d /usr/lib/jvm/*17* 2>/dev/null | head -1)
          if [ -z "$J17" ]; then echo "::error::JDK 17 not found under /usr/lib/jvm"; exit 1; fi
          echo "JAVA_HOME=$J17" >> "$GITHUB_ENV"
          echo "Selected JAVA_HOME=$J17"
          "$J17/bin/java" -version

      - name: Restore stable debug keystore (for seamless in-place upgrades)
        run: |
          # buildozer `android debug` 用 ~/.android/debug.keystore 给 APK 签名。
          # 默认每次 CI 都是全新 VM、会随机重新生成该文件 → 签名不一致 → 必须卸载旧版。
          # 这里用仓库内固定密钥库覆盖它，使所有 debug 构建签名一致、可直接覆盖安装。
          # 该密钥库就是标准 Android debug 格式(alias=androiddebugkey, 密码=android)，
          # 与 buildozer 期望完全一致。
          mkdir -p "$HOME/.android"
          cp keystore/debug.keystore "$HOME/.android/debug.keystore"
          echo "已恢复固定 debug 密钥库"

      - name: Build APK (debug, stable signing key)
        id: build
        env:
          # 让 buildozer 自动接受 Android SDK 许可
          CI: "true"
        run: |
          # 完整输出同时落盘到 buildozer_full.log，失败时可精准抓取真错误
          # 注意：GitHub 默认 bash 带 -o pipefail，buildozer 失败会让本步骤失败
          set -o pipefail
          # android debug 产出可直接安装的 bin/*.apk，并用上面恢复的
          # ~/.android/debug.keystore 签名 → 跨构建签名一致、可覆盖安装。
          # （不要用 android release：它会产出 .aab 而非 .apk，无法直接装到手机。）
          buildozer android debug --verbose 2>&1 | tee buildozer_full.log

      - name: Surface real error on failure
        if: failure()
        run: |
          echo "===== bin 目录内容（确认是否产出 apk）====="
          ls -la bin/ 2>/dev/null || echo "（无 bin 目录）"
          echo "===== [1] buildozer_full.log 关键错误行（已覆盖 OOM/超时/make 失败）====="
          grep -niE "error:|exception|traceback|command failed|fatal error|could not|no such|404|denied|missing|killed|sigkill|out of memory|memoryerror|cannot allocate|terminated|signal|make: \*\*\*|exit code|timed out|timeout" buildozer_full.log 2>/dev/null | tail -n 120 || true
          echo "===== [2] 所有 .buildozer 子日志中的错误行 ====="
          grep -rniE "error:|command failed|fatal|killed|out of memory|make: \*\*\*" .buildozer/android/platform/build-*/ 2>/dev/null | tail -n 60 || true
          echo "===== [3] buildozer_full.log 末尾 200 行（看中断点）====="
          tail -n 200 buildozer_full.log 2>/dev/null || echo "（无 buildozer_full.log）"
          echo "===== 诊断提示 ====="
          if grep -qiE "killed|sigkill|out of memory|cannot allocate memory" buildozer_full.log 2>/dev/null; then
            echo ">>> 检测到内存不足(OOM)被杀。可降低并行编译或加大 runner 内存。"
          elif [ ! -s buildozer_full.log ]; then
            echo ">>> buildozer_full.log 为空，构建在极早阶段即崩溃。"
          else
            echo ">>> 未捕获到显式错误文本。很可能 job 被 OOM 杀掉或 6 小时超时；请下载下方 buildozer-debug-logs artifact，直接看 buildozer_full.log 的最后几行确认中断点。"
          fi

      - name: Upload APK artifact
        # 关键：必须用 build 步骤自身的 outcome，不能用默认的 success()——
        # 否则 build 失败后“Surface error”步骤(退出0)会让 success() 误判、仍尝试上传导致误报。
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: webcrawler-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-debug-logs
          path: |
            buildozer_full.log
            .buildozer/android/platform/build-*/**/*.log
            *.log
          if-no-files-found: ignore
