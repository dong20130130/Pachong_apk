name: Build Android APK

# 触发：手动触发，或推送到 main/master 时自动构建
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool pkg-config

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          # 锁定经过验证的稳定组合，避免最新版漂移导致 p4a 编译失败
          # 注意：buildozer 无 1.5.2 版本，PyPI 现有 ...1.5.0, 1.6.0；这里用 1.5.0
          pip install "buildozer==1.5.0" "Cython==0.29.36"

      - name: Build APK (debug)
        env:
          # 让 buildozer 自动接受 Android SDK 许可
          CI: "true"
        run: |
          buildozer android debug --verbose

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: webcrawler-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-debug-logs
          path: |
            .buildozer/android/platform/build-*/**/*.log
            *.log
          if-no-files-found: ignore
